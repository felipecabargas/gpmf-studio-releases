name: Build installers

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout GPMFStudio source (private, via deploy key)
        uses: actions/checkout@v4
        with:
          repository: felipecabargas/GPMFStudio
          ssh-key: ${{ secrets.GPMFSTUDIO_DEPLOY_KEY }}
          path: GPMFStudio

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: GPMFStudio
        run: npm ci

      - name: Build macOS installers (arm64 then x64)
        if: runner.os == 'macOS'
        working-directory: GPMFStudio
        shell: bash
        run: |
          npm run dist -- --mac --arm64 --publish never
          mv "release/GPMF Studio-"*.dmg release/GPMF-Studio-mac-arm64.dmg
          rm -f node_modules/ffmpeg-static/ffmpeg
          npm_config_platform=darwin npm_config_arch=x64 node node_modules/ffmpeg-static/install.js
          npm run dist -- --mac --x64 --publish never
          mv "release/GPMF Studio-"*.dmg release/GPMF-Studio-mac-x64.dmg

      - name: Build Windows installer
        if: runner.os == 'Windows'
        working-directory: GPMFStudio
        shell: bash
        run: |
          npm run dist -- --win --x64 --publish never
          mv release/*.exe release/GPMF-Studio-win-x64.exe

      - name: Build Linux installer
        if: runner.os == 'Linux'
        working-directory: GPMFStudio
        shell: bash
        run: |
          npm run dist -- --linux --x64 --publish never
          mv release/*.AppImage release/GPMF-Studio-linux-x64.AppImage

      - name: Read app version
        id: version
        working-directory: GPMFStudio
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: GPMF Studio v${{ steps.version.outputs.version }}
          make_latest: true
          files: GPMFStudio/release/GPMF-Studio-*
